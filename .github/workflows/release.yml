name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' SimpleWhisper/SimpleWhisper.csproj | head -n1)
          if [ -z "${VERSION}" ]; then
            echo "Failed to read <Version> from SimpleWhisper/SimpleWhisper.csproj" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} does not exist — proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            framework: net10.0-windows10.0.19041.0
            archive-ext: zip
          - os: ubuntu-24.04
            rid: linux-x64
            framework: net10.0
            archive-ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from csproj
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' SimpleWhisper/SimpleWhisper.csproj | head -n1)
          if [ -z "${VERSION}" ]; then
            echo "Failed to read <Version> from SimpleWhisper/SimpleWhisper.csproj" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkgver=${VERSION//-/_}" >> "$GITHUB_OUTPUT"
          echo "debver=${VERSION//-/\~}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Linux dependencies
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        shell: bash
        run: |
          dotnet publish SimpleWhisper \
            -c Release \
            -f ${{ matrix.framework }} \
            -r ${{ matrix.rid }} \
            -p:IlcInstructionSet=x86-64-v3

      - name: Strip irrelevant runtimes
        shell: bash
        run: |
          PUBLISH_DIR="SimpleWhisper/bin/Release/${{ matrix.framework }}/${{ matrix.rid }}/publish"
          RUNTIMES_DIR="${PUBLISH_DIR}/runtimes"
          if [ -d "${RUNTIMES_DIR}" ]; then
            rm -f "${PUBLISH_DIR}/ggml-metal.metal"
            rm -f "${PUBLISH_DIR}"/*.dbg "${PUBLISH_DIR}"/*.pdb
            find "${RUNTIMES_DIR}" -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
              dirname=$(basename "$dir")
              case "$dirname" in
                cuda|vulkan|coreml)
                  find "$dir" -mindepth 1 -maxdepth 1 -type d | while read -r subdir; do
                    if [ "$(basename "$subdir")" != "${{ matrix.rid }}" ]; then
                      rm -rf "$subdir"
                    fi
                  done
                  rmdir "$dir" 2>/dev/null || true
                  ;;
                ${{ matrix.rid }})
                  ;;
                *)
                  rm -rf "$dir"
                  ;;
              esac
            done
          fi

      - name: Build installer (Inno Setup)
        if: matrix.rid == 'win-x64'
        shell: cmd
        run: |
          iscc /DVersion=${{ steps.version.outputs.pkgver }} /DPublishDir=%GITHUB_WORKSPACE%\SimpleWhisper\bin\Release\${{ matrix.framework }}\${{ matrix.rid }}\publish installer\SimpleWhisper.iss

      - name: Build .deb package
        if: matrix.rid == 'linux-x64'
        run: |
          DEBVER=${{ steps.version.outputs.debver }}
          PKGVER=${{ steps.version.outputs.pkgver }}
          PUBLISH_DIR="SimpleWhisper/bin/Release/${{ matrix.framework }}/${{ matrix.rid }}/publish"
          DEB_DIR="deb-staging"

          mkdir -p "${DEB_DIR}/DEBIAN"
          mkdir -p "${DEB_DIR}/opt/simple-whisper"
          mkdir -p "${DEB_DIR}/usr/bin"
          mkdir -p "${DEB_DIR}/usr/share/applications"

          cp -r "${PUBLISH_DIR}/." "${DEB_DIR}/opt/simple-whisper/"
          chmod +x "${DEB_DIR}/opt/simple-whisper/SimpleWhisper"
          ln -s /opt/simple-whisper/SimpleWhisper "${DEB_DIR}/usr/bin/simple-whisper"
          cp installer/simple-whisper.desktop "${DEB_DIR}/usr/share/applications/"

          cat > "${DEB_DIR}/DEBIAN/control" <<CTRL
          Package: simple-whisper
          Version: ${DEBVER}-1
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: libasound2, libx11-6
          Maintainer: SimpleWhisper
          Description: Speech-to-text transcription using Whisper
          CTRL
          sed -i 's/^          //' "${DEB_DIR}/DEBIAN/control"

          dpkg-deb --build "${DEB_DIR}" "simple-whisper-${PKGVER}-1-linux-x64.deb"

      - name: Build .pkg.tar.zst package
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get install -y libarchive-tools zstd

          PKGVER=${{ steps.version.outputs.pkgver }}
          PUBLISH_DIR="SimpleWhisper/bin/Release/${{ matrix.framework }}/${{ matrix.rid }}/publish"
          PKG_DIR="pkg-staging"

          mkdir -p "${PKG_DIR}/opt/simple-whisper"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/applications"

          cp -r "${PUBLISH_DIR}/." "${PKG_DIR}/opt/simple-whisper/"
          chmod +x "${PKG_DIR}/opt/simple-whisper/SimpleWhisper"
          ln -s /opt/simple-whisper/SimpleWhisper "${PKG_DIR}/usr/bin/simple-whisper"
          cp installer/simple-whisper.desktop "${PKG_DIR}/usr/share/applications/"

          INSTALL_SIZE=$(du -sk "${PKG_DIR}" | cut -f1)
          BUILD_DATE=$(date +%s)

          cat > "${PKG_DIR}/.PKGINFO" <<PKGINFO
          pkgname = simple-whisper
          pkgver = ${PKGVER}-1
          pkgdesc = Speech-to-text transcription using Whisper
          builddate = ${BUILD_DATE}
          size = ${INSTALL_SIZE}
          arch = x86_64
          PKGINFO
          sed -i 's/^          //' "${PKG_DIR}/.PKGINFO"

          cd "${PKG_DIR}"
          fakeroot bsdtar -cf ../.MTREE --format=mtree --options='!all,use-set,type,uid,gid,mode,time,size,sha256' .
          mv ../.MTREE .
          fakeroot bsdtar --zstd -cf "../simple-whisper-${PKGVER}-1-x86_64.pkg.tar.zst" .PKGINFO .MTREE opt/ usr/

      - name: Package (tar.gz)
        if: matrix.archive-ext == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE_NAME="SimpleWhisper-${{ steps.version.outputs.pkgver }}-${{ matrix.rid }}.tar.gz"
          tar -czf "${ARCHIVE_NAME}" \
            -C SimpleWhisper/bin/Release/${{ matrix.framework }}/${{ matrix.rid }}/publish .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive-ext == 'zip'
        shell: bash
        run: |
          ARCHIVE_NAME="SimpleWhisper-${{ steps.version.outputs.pkgver }}-${{ matrix.rid }}.zip"
          cd SimpleWhisper/bin/Release/${{ matrix.framework }}/${{ matrix.rid }}/publish
          7z a -tzip "${GITHUB_WORKSPACE}/${ARCHIVE_NAME}" .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: SimpleWhisper-${{ matrix.rid }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 1

      - name: Upload installer artifact
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: SimpleWhisper-win-x64-setup
          path: installer/Output/SimpleWhisper-${{ steps.version.outputs.pkgver }}-win-x64-setup.exe
          retention-days: 1

      - name: Upload .deb artifact
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: simple-whisper-deb
          path: simple-whisper-${{ steps.version.outputs.pkgver }}-1-linux-x64.deb
          retention-days: 1

      - name: Upload .pkg.tar.zst artifact
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: simple-whisper-pkg
          path: simple-whisper-${{ steps.version.outputs.pkgver }}-1-x86_64.pkg.tar.zst
          retention-days: 1

  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Compute prerelease flag
        id: meta
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          if echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: SimpleWhisper ${{ needs.check.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*
          target_commitish: ${{ github.sha }}
